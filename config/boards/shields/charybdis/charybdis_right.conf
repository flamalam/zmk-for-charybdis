CONFIG_SPI=y
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_PD_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_PD_DEDICATED_WORK_QUEUE_PRIORITY=2
CONFIG_ZMK_MOUSE=y

# High-priority mouse thread for better responsiveness
CONFIG_ZMK_MOUSE_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_MOUSE_DEDICATED_THREAD_PRIORITY=0

# Balanced polling for smooth slow-speed detection
CONFIG_ZMK_MOUSE_TICK_DURATION=8
CONFIG_ZMK_TRACKBALL_POLL_DURATION=10

# Sensor Hardware Settings
CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=800
CONFIG_PMW3610_CPI_DIVIDOR=4
CONFIG_PMW3610_ORIENTATION_90=y
CONFIG_PMW3610_INVERT_X=y

# Disable acceleration algorithm for linear, predictable scrolling
CONFIG_PMW3610_SMART_ALGORITHM=n

# Precision Snipe Mode Settings
CONFIG_PMW3610_SNIPE_CPI=200
CONFIG_PMW3610_SNIPE_CPI_DIVIDOR=2

# Standard Sleep/Power Settings
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=100
CONFIG_PMW3610_REST2_SAMPLE_TIME_MS=200
CONFIG_PMW3610_REST3_SAMPLE_TIME_MS=300
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=500
CONFIG_PMW3610_REST1_DOWNSHIFT_TIME_MS=3000
CONFIG_PMW3610_REST2_DOWNSHIFT_TIME_MS=30000
